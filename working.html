                <button class="nav-btn active" onclick="showView('scenarios')">Сценарии</button>

                <button class="nav-btn" onclick="showView('stats')">Прогресс</button>

        <main class="main">
            <section id="scenarios-view" class="view active">

                    <div class="filters">
                        <div class="filter-group">
                            <label class="filter-label">Категория:</label>

                                <option value="demo">🎯 Демонстрация</option>
                                <option value="objections">🛡️ Работа с возражениями</option>

                            </select>
                        </div>
                        <div class="filter-group">
                            <label class="filter-label">Сложность:</label>
                            <select id="difficulty-filter" class="filter-select" onchange="renderScenarios()">
                                <option value="all">Все уровни</option>
                                <option value="beginner">Начальный</option>
                                <option value="intermediate">Средний</option>
                                <option value="advanced">Продвинутый</option>
                            </select>
                        </div>
                    </div>

                    <div id="scenarios-list" class="scenarios-grid"></div>
                </div>
            </section>

        // ==========================================
        // ФУНКЦИИ ПРИЛОЖЕНИЯ
        // ==========================================
        function showView(viewName) {
            document.querySelectorAll('.view').forEach(view => {
                view.classList.remove('active');
            });
            document.getElementById(viewName + '-view').classList.add('active');

            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.toggle('active', btn.getAttribute('onclick').includes(viewName));
            });
        }

        function getScenarioIcon(category) {
            const icons = { 'demo': '🎯', 'objections': '🛡️', 'closing': '💰' };
            return icons[category] || '📋';
        }

        function getCategoryLabel(category) {
            const labels = { 'demo': 'Демонстрация', 'objections': 'Возражения', 'closing': 'Закрытие' };
            return labels[category] || category;
        }

        function getDifficultyLabel(difficulty) {
            const labels = { 'beginner': 'Начальный', 'intermediate': 'Средний', 'advanced': 'Продвинутый' };
            return labels[difficulty] || difficulty;
        }

        function createScenarioCard(scenario) {
            const card = document.createElement('div');
            card.className = 'scenario-card';
            card.onclick = () => alert('Сценарий: ' + scenario.title + '\n\nЭто демо-версия. Полная функциональность будет доступна после подключения AI API.');

            const icon = getScenarioIcon(scenario.category);

            card.innerHTML = `
                <div class="scenario-card-header">
                    <div class="scenario-card-title">${scenario.title}</div>
                    <div class="scenario-card-icon">${icon}</div>
                </div>
                <div class="scenario-card-description">${scenario.description}</div>
                <div class="scenario-card-meta">
                    <span class="badge ${scenario.category}">${getCategoryLabel(scenario.category)}</span>
                    <span class="badge ${scenario.difficulty}">${getDifficultyLabel(scenario.difficulty)}</span>
                </div>
            `;

            return card;
        }

        function renderScenarios() {
            const list = document.getElementById('scenarios-list');
            const categoryFilter = document.getElementById('category-filter').value;
            const difficultyFilter = document.getElementById('difficulty-filter').value;

            let filtered = ALL_SCENARIOS;

            if (categoryFilter !== 'all') {
                filtered = filtered.filter(s => s.category === categoryFilter);
            }

            if (difficultyFilter !== 'all') {
                filtered = filtered.filter(s => s.difficulty === difficultyFilter);
            }

            list.innerHTML = '';

            filtered.forEach(scenario => {
                const card = createScenarioCard(scenario);
                list.appendChild(card);
            });

            console.log('Загружено сценариев:', filtered.length);
        }

            console.log('Всего сценариев:', ALL_SCENARIOS.length);
            renderScenarios();
