            </div>
            <nav class="nav">
                <button class="nav-btn active" onclick="showView('scenarios')">Сценарии</button>
                <button class="nav-btn" onclick="showView('resources')">Материалы</button>
                <button class="nav-btn" onclick="showView('stats')">Прогресс</button>
            </nav>
        </header>

        <main class="main">
            <section id="scenarios-view" class="view active">
                <div class="container">
                    <h2 class="page-title">Выберите сценарий</h2>

                    <div class="filters">
                        <div class="filter-group">
                            <label class="filter-label">Категория:</label>
                            <select id="category-filter" class="filter-select" onchange="renderScenarios()">

                                <option value="demo">🎯 Демонстрация</option>
                                <option value="objections">🛡️ Работа с возражениями</option>
                                <option value="closing">💰 Закрытие сделки</option>
                            </select>
                        </div>
                        <div class="filter-group">
                            <label class="filter-label">Сложность:</label>
                            <select id="difficulty-filter" class="filter-select" onchange="renderScenarios()">
                                <option value="all">Все уровни</option>
                                <option value="beginner">Начальный</option>
                                <option value="intermediate">Средний</option>
                                <option value="advanced">Продвинутый</option>
                            </select>
                        </div>
                    </div>

                    <div id="scenarios-list" class="scenarios-grid"></div>
                </div>
            </section>

            <section id="resources-view" class="view">
                <div class="resources-container">
                    <h2 class="page-title">📚 Материалы для менеджеров</h2>
                    <p style="text-align: center; padding: 40px;">Раздел в разработке. Скоро здесь будет информация о продукте ITSM365.</p>
                </div>
            </section>

            <section id="stats-view" class="view">

                    <p style="text-align: center; padding: 40px;">Статистика будет доступна после завершения тренировок.</p>
                </div>
            </section>
        </main>

        // ==========================================
        // ФУНКЦИИ ПРИЛОЖЕНИЯ
        // ==========================================
        function showView(viewName) {
            document.querySelectorAll('.view').forEach(view => {
                view.classList.remove('active');
            });
            document.getElementById(viewName + '-view').classList.add('active');

            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.toggle('active', btn.getAttribute('onclick').includes(viewName));
            });
        }

        function getScenarioIcon(category) {
            const icons = { 'demo': '🎯', 'objections': '🛡️', 'closing': '💰' };
            return icons[category] || '📋';
        }

        function getCategoryLabel(category) {
            const labels = { 'demo': 'Демонстрация', 'objections': 'Возражения', 'closing': 'Закрытие' };
            return labels[category] || category;
        }

        function getDifficultyLabel(difficulty) {
            const labels = { 'beginner': 'Начальный', 'intermediate': 'Средний', 'advanced': 'Продвинутый' };
            return labels[difficulty] || difficulty;
        }

        function createScenarioCard(scenario) {
            const card = document.createElement('div');
            card.className = 'scenario-card';
            card.onclick = () => startScenario(scenario);

            const icon = getScenarioIcon(scenario.category);

            card.innerHTML = `
                <div class="scenario-card-header">
                    <div class="scenario-card-title">${scenario.title}</div>
                    <div class="scenario-card-icon">${icon}</div>
                </div>
                <div class="scenario-card-description">${scenario.description}</div>
                <div class="scenario-card-meta">
                    <span class="badge ${scenario.category}">${getCategoryLabel(scenario.category)}</span>
                    <span class="badge ${scenario.difficulty}">${getDifficultyLabel(scenario.difficulty)}</span>
                </div>
            `;

            return card;
        }

        // ==========================================
        // СИМУЛЯЦИЯ СЦЕНАРИЯ
        // ==========================================
        let currentScenario = null;
        let conversation = [];

        function startScenario(scenario) {
            currentScenario = scenario;
            conversation = [];

            // Сохраняем текущий view
            const scenariosView = document.getElementById('scenarios-view');
            scenariosView.innerHTML = createSimulationHTML(scenario);

            // Приветствие клиента
            setTimeout(() => {
                addMessage('assistant', getClientGreeting(scenario));
            }, 500);
        }

        function createSimulationHTML(scenario) {
            return `
                <div class="simulation-container">
                    <div class="scenario-info">
                        <button class="back-btn" onclick="backToScenarios()">← Назад к сценариям</button>
                        <div class="scenario-details">
                            <h2 class="scenario-title">${scenario.title}</h2>
                            <div class="scenario-meta">
                                <span class="badge ${scenario.category}">${getCategoryLabel(scenario.category)}</span>
                                <span class="badge ${scenario.difficulty}">${getDifficultyLabel(scenario.difficulty)}</span>
                            </div>
                        </div>
                    </div>

                    <div class="client-profile">
                        <div class="client-avatar">👤</div>
                        <div class="client-info">
                            <h3 class="client-name">${scenario.client_profile.name}</h3>
                            <p class="client-role">${scenario.client_profile.role}</p>
                            <p class="client-company">${scenario.client_profile.company}</p>
                        </div>
                    </div>

                    <div class="pain-points">
                        <h4>💡 Начните диалог:</h4>
                        <p>Поприветствуйте клиента и начните продажу ITSM365</p>
                    </div>

                    <div class="chat-container">
                        <div id="chat-messages" class="chat-messages"></div>

                        <div class="chat-input-container">
                            <textarea id="chat-input" class="chat-input" placeholder="Ваше сообщение..." rows="2" onkeydown="if(event.key==='Enter' && !event.shiftKey){event.preventDefault(); sendMessage();}"></textarea>
                            <div class="input-actions">
                                <button id="send-btn" class="send-btn" onclick="sendMessage()">Отправить</button>
                            </div>
                        </div>
                    </div>

                    <div class="actions-panel">
                        <button id="end-btn" class="action-btn secondary" onclick="endScenario()">Завершить</button>
                    </div>
                </div>
            `;
        }

        function getClientGreeting(scenario) {
            const greetings = {
                'demo': 'Добрый день! Расскажите о вашей системе.',
                'objections': 'Здравствуйте. У меня есть вопросы по вашей системе.',
                'closing': 'Добрый день! Готов обсудить дальнейшее сотрудничество.'
            };
            return greetings[scenario.category] || 'Здравствуйте!';
        }

        function addMessage(role, content) {
            const chatMessages = document.getElementById('chat-messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;

            const speaker = document.createElement('div');
            speaker.className = 'message-speaker';
            speaker.textContent = role === 'user' ? 'Вы' : currentScenario.client_profile.name;

            const messageContent = document.createElement('div');
            messageContent.className = 'message-content';
            messageContent.innerHTML = `<p>${content}</p>`;

            messageDiv.appendChild(speaker);
            messageDiv.appendChild(messageContent);
            chatMessages.appendChild(messageDiv);

            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function sendMessage() {
            const chatInput = document.getElementById('chat-input');
            const message = chatInput.value.trim();

            if (!message) return;

            addMessage('user', message);
            conversation.push({ role: 'user', content: message });
            chatInput.value = '';

            // Симуляция ответа AI
            setTimeout(() => {
                const response = generateAIResponse(message);
                addMessage('assistant', response);
                conversation.push({ role: 'assistant', content: response });
            }, 1000 + Math.random() * 1000);
        }

        function generateAIResponse(userMessage) {
            // Простая симуляция ответов
            const responses = [
                'Интересно. Расскажите подробнее.',
                'А как это работает с нашей текущей инфраструктурой?',
                'Сколько времени займёт внедрение?',
                'Это звучит дорого по сравнению с конкурентами.',
                'Нам надо обсудить это с руководством.',
                'Покажите демо конкретного кейса.',
                'Какие у вас условия поддержки?',
                'Есть ли у вас.references в нашей отрасли?'
            ];

            return responses[Math.floor(Math.random() * responses.length)];
        }

        function endScenario() {
            const score = Math.floor(60 + Math.random() * 30); // 60-90%

            const scenariosView = document.getElementById('scenarios-view');
            scenariosView.innerHTML = `
                <div class="results-container">
                    <h2 class="results-title">📊 Результаты тренировки</h2>

                    <div class="score-card">
                        <div class="score-value">${score}%</div>
                        <div class="score-label">Общая оценка</div>
                    </div>

                    <div class="results-details">
                        <h3>Выполненные цели:</h3>
                        <ul class="achieved-list">
                            <li>✓ Диалог начат</li>
                            <li>✓ Выявлены потребности клиента</li>
                            <li>✓ Предложено решение</li>
                        </ul>
                    </div>

                    <div class="results-feedback">
                        <h3>💡 Рекомендации:</h3>
                        <p>Хорошая работа! Рекомендую больше практиковаться с возражениями и закрытием сделок.</p>
                    </div>

                    <div class="results-actions">
                        <button class="action-btn primary" onclick="renderScenarios(); showView('scenarios');">Вернуться к сценариям</button>
                    </div>
                </div>
            `;
        }

        function backToScenarios() {
            location.reload();
        }

        function renderScenarios() {
            const list = document.getElementById('scenarios-list');
            const categoryFilter = document.getElementById('category-filter').value;
            const difficultyFilter = document.getElementById('difficulty-filter').value;

            let filtered = ALL_SCENARIOS;

            if (categoryFilter !== 'all') {
                filtered = filtered.filter(s => s.category === categoryFilter);
            }

            if (difficultyFilter !== 'all') {
                filtered = filtered.filter(s => s.difficulty === difficultyFilter);
            }

            list.innerHTML = '';

            filtered.forEach(scenario => {
                const card = createScenarioCard(scenario);
                list.appendChild(card);
            });

            console.log('Загружено сценариев:', filtered.length);
        }

        // ==========================================
        // ИНИЦИАЛИЗАЦИЯ
        // ==========================================
        document.addEventListener('DOMContentLoaded', () => {
            console.log('Приложение загружено');
            console.log('Всего сценариев:', ALL_SCENARIOS.length);
            renderScenarios();
        });
    </script>
