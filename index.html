<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ITSM 365 — Тренажёр менеджеров по продажам</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #F5F7FA;
            color: #1A1A1A;
            line-height: 1.6;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
        .hero { text-align: center; margin-bottom: 60px; }
        .logo { font-size: 3rem; font-weight: 700; color: #0066CC; margin-bottom: 20px; }
        .hero p { font-size: 1.2rem; color: #6B7280; margin-bottom: 40px; }
        .cta-button {
            background: #FF6B35; color: white; border: none; padding: 15px 40px;
            font-size: 1.1rem; font-weight: 600; border-radius: 8px; cursor: pointer;
            transition: background 0.2s;
        }
        .cta-button:hover { background: #e55a2b; }
        .scenario-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 25px; }
        .scenario-card {
            background: white; border: 1px solid #E5E7EB; border-radius: 12px; padding: 25px;
            cursor: pointer; transition: all 0.2s;
        }
        .scenario-card:hover { border-color: #0066CC; transform: translateY(-2px); box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .scenario-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 10px; }
        .scenario-desc { font-size: 0.9rem; color: #6B7280; margin-bottom: 15px; }
        .scenario-meta { font-size: 0.8rem; color: #6B7280; margin-bottom: 15px; }
        .scenario-button {
            width: 100%; padding: 12px; background: #0066CC; color: white;
            border: none; border-radius: 8px; font-weight: 600; cursor: pointer;
            transition: background 0.2s;
        }
        .scenario-button:hover { background: #0056b3; }
        .simulation { display: none; }
        .simulation.active { display: block; }
        .sim-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid #E5E7EB;
        }
        .client-info {
            background: white; border: 1px solid #E5E7EB; border-radius: 8px;
            padding: 15px; margin-bottom: 20px;
        }
        .chat-box {
            background: white; border: 1px solid #E5E7EB; border-radius: 8px;
            overflow: hidden;
        }
        .chat-messages {
            min-height: 400px; max-height: 400px; overflow-y: auto;
            padding: 20px; background: #F8FAFC;
        }
        .message { margin-bottom: 20px; }
        .message-sender { font-size: 0.75rem; color: #6B7280; margin-bottom: 5px; }
        .message-content {
            padding: 12px 16px; border-radius: 8px; line-height: 1.5;
        }
        .message.user .message-content { background: #0066CC; color: white; margin-left: auto; max-width: 70%; }
        .message.assistant .message-content { background: #E5E7EB; max-width: 70%; }
        .chat-input-area {
            padding: 15px; border-top: 1px solid #E5E7EB;
        }
        .chat-input {
            width: 100%; border: 1px solid #E5E7EB; border-radius: 8px; padding: 12px;
            resize: none; font-family: inherit;
        }
        .actions { display: flex; gap: 10px; margin-top: 10px; }
        .voice-btn {
            width: 40px; height: 40px; border-radius: 50%; border: 1px solid #E5E7EB;
            background: white; cursor: pointer; font-size: 1.2rem;
        }
        .send-btn {
            padding: 10px 24px; background: #0066CC; color: white;
            border: none; border-radius: 8px; font-weight: 600; cursor: pointer;
        }
        .send-btn:hover { background: #0056b3; }
        .back-btn {
            padding: 8px 16px; background: #F5F7FA; border: 1px solid #E5E7EB;
            border-radius: 6px; cursor: pointer;
        }
        .back-btn:hover { background: #e5e7eb; }
        .recording {
            position: fixed; bottom: 20px; right: 20px; background: #FF6B35;
            color: white; padding: 12px 20px; border-radius: 30px; display: none;
        }
        .recording.active { display: flex; align-items: center; gap: 10px; }
        .recording-dot {
            width: 10px; height: 10px; background: white; border-radius: 50%;
            animation: blink 1s infinite;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .metrics-panel {
            background: white; border: 1px solid #E5E7EB; border-radius: 8px;
            padding: 15px; margin-bottom: 20px;
        }
        .metrics-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .metric-item { text-align: center; }
        .metric-value { font-size: 1.5rem; font-weight: 700; color: #0066CC; }
        .metric-label { font-size: 0.75rem; color: #6B7280; margin-top: 5px; }
        .last-response { margin-top: 15px; padding-top: 15px; border-top: 1px solid #E5E7EB; }
        .response-grade { font-weight: 600; margin-bottom: 5px; }
        .grade-5 { color: #10B981; }
        .grade-4 { color: #3B82F6; }
        .grade-3 { color: #F59E0B; }
        .grade-2 { color: #EF4444; }
        .grade-1 { color: #DC2626; }
        .feedback-tip { font-size: 0.9rem; color: #6B7280; }
    </style>
</head>
<body>
    <div class="container">
        <!-- Главный экран -->
        <div class="hero" id="hero">
            <div class="logo">ITSM 365</div>
            <h1>Тренажёр менеджеров по продажам</h1>
            <p>Практикуйте навыки B2B продаж с AI-клиентами в реалистичных сценариях</p>
            <button class="cta-button" id="startButton">🚀 Начать тренировку →</button>
        </div>

        <!-- Сценарии -->
        <div id="scenarios" style="display: none;">
            <h2 style="color: #0066CC; margin-bottom: 20px;">Выберите сценарий</h2>
            <div class="scenario-grid" id="scenarioGrid"></div>
        </div>

        <!-- Симуляция -->
        <div id="simulation" class="simulation">
            <div class="sim-header">
                <h2 id="simTitle">Загрузка...</h2>
                <button class="back-btn" id="backButton">← Назад</button>
            </div>

            <div class="client-info">
                <h3 id="clientName">-</h3>
                <p id="clientRole">-</p>
            </div>

            <div class="metrics-panel">
                <div class="metrics-grid">
                    <div class="metric-item">
                        <div class="metric-value" id="metricResponses">0</div>
                        <div class="metric-label">Ответов</div>
                    </div>
                    <div class="metric-item">
                        <div class="metric-value" id="metricAvgScore">-</div>
                        <div class="metric-label">Средняя оценка</div>
                    </div>
                    <div class="metric-item">
                        <div class="metric-value" id="metricBestScore">-</div>
                        <div class="metric-label">Лучшая оценка</div>
                    </div>
                </div>
                <div id="lastResponse" class="last-response" style="display: none;">
                    <div id="responseGrade" class="response-grade">Последний ответ: -</div>
                    <div id="responseFeedback" class="feedback-tip">-</div>
                </div>
            </div>

            <div class="chat-box">
                <div id="chatMessages" class="chat-messages"></div>
                <div class="chat-input-area">
                    <textarea id="chatInput" class="chat-input" placeholder="Ваше сообщение..." rows="3"></textarea>
                    <div class="actions">
                        <button id="voiceButton" class="voice-btn">🎤</button>
                        <button id="sendButton" class="send-btn">💬 Отправить</button>
                    </div>
                </div>
            </div>

            <div id="recording" class="recording">
                <div class="recording-dot"></div>
                <span>Слушаю...</span>
            </div>
        </div>
    </div>

    <script>
        // Данные сценариев
        const scenarios = [
            {
                id: 'cold-call',
                title: 'Холодный звонок в IT компанию',
                category: 'cold-call',
                difficulty: 'intermediate',
                duration: 10,
                client: {
                    name: 'Алексей',
                    role: 'IT Директор',
                    company: 'IT компания "Инфotech"'
                },
                greeting: 'Алло? Слушаю, у меня мало времени. Кто звонит?'
            },
            {
                id: 'demo-banking',
                title: 'Демо для CIO банка',
                category: 'demo',
                difficulty: 'advanced',
                duration: 15,
                client: {
                    name: 'Иван',
                    role: 'CIO',
                    company: 'Банк "Солид"'
                },
                greeting: 'Добрый день! У нас 15 минут. Что предлагаем показать?'
            },
            {
                id: 'objection-price',
                title: 'Возражение: "Дорого"',
                category: 'objections',
                difficulty: 'intermediate',
                duration: 12,
                client: {
                    name: 'Дмитрий',
                    role: 'IT Manager',
                    company: 'Торговая сеть'
                },
                greeting: 'Посмотрели демо, всё неплохо. Но у вас цены выше чем у 1C. Почему нам платить больше?'
            },
            {
                id: 'closing',
                title: 'Закрытие сделки',
                category: 'closing',
                difficulty: 'intermediate',
                duration: 8,
                client: {
                    name: 'Елена',
                    role: 'Руководитель поддержки',
                    company: 'Страховая компания'
                },
                greeting: 'Спасибо за демо, система интересная. Нужно согласовать бюджет. Что делать дальше?'
            }
        ];

        // Состояние
        let currentScenario = null;
        let conversation = [];
        let metrics = { responses: 0, scores: [], bestScore: 0 };
        let isRecording = false;
        let recognition = null;

        // Элементы DOM
        const elements = {
            hero: document.getElementById('hero'),
            scenarios: document.getElementById('scenarios'),
            scenarioGrid: document.getElementById('scenarioGrid'),
            simulation: document.getElementById('simulation'),
            simTitle: document.getElementById('simTitle'),
            clientName: document.getElementById('clientName'),
            clientRole: document.getElementById('clientRole'),
            chatMessages: document.getElementById('chatMessages'),
            chatInput: document.getElementById('chatInput'),
            metricResponses: document.getElementById('metricResponses'),
            metricAvgScore: document.getElementById('metricAvgScore'),
            metricBestScore: document.getElementById('metricBestScore'),
            lastResponse: document.getElementById('lastResponse'),
            responseGrade: document.getElementById('responseGrade'),
            responseFeedback: document.getElementById('responseFeedback')
        };

        // Функции
        function showScenarios() {
            console.log('showScenarios called');
            elements.hero.style.display = 'none';
            elements.scenarios.style.display = 'block';
            renderScenarios();
        }

        function renderScenarios() {
            elements.scenarioGrid.innerHTML = '';

            const categories = {
                'cold-call': '📞 Холодные звонки',
                'demo': '🎯 Демонстрации',
                'objections': '🛡️ Возражения',
                'closing': '💰 Закрытие'
            };

            let currentCat = null;

            scenarios.forEach(scenario => {
                if (scenario.category !== currentCat) {
                    currentCat = scenario.category;
                    const header = document.createElement('h3');
                    header.style.cssText = 'color: #1A1A1A; margin: 30px 0 15px 0;';
                    header.textContent = categories[scenario.category];
                    elements.scenarioGrid.appendChild(header);
                }

                const card = document.createElement('div');
                card.className = 'scenario-card';

                const diffLabel = scenario.difficulty === 'advanced' ? 'Продвинутый' :
                                  scenario.difficulty === 'intermediate' ? 'Средний' : 'Начальный';

                card.innerHTML = `
                    <div class="scenario-meta">📋 ${diffLabel} • ${scenario.duration} мин</div>
                    <h4 class="scenario-title">${scenario.title}</h4>
                    <p class="scenario-desc">${scenario.client.name} — ${scenario.client.role}</p>
                    <button class="scenario-button">Начать тренировку →</button>
                `;

                const button = card.querySelector('.scenario-button');
                button.onclick = (e) => {
                    e.stopPropagation();
                    startSimulation(scenario.id);
                };

                card.onclick = () => startSimulation(scenario.id);

                elements.scenarioGrid.appendChild(card);
            });
        }

        function startSimulation(scenarioId) {
            const scenario = scenarios.find(s => s.id === scenarioId);
            if (!scenario) return;

            currentScenario = scenario;
            conversation = [];
            metrics = { responses: 0, scores: [], bestScore: 0 };

            // Показываем симуляцию
            elements.hero.style.display = 'none';
            elements.scenarios.style.display = 'none';
            elements.simulation.classList.add('active');

            // Заполняем информацию
            elements.simTitle.textContent = scenario.title;
            elements.clientName.textContent = scenario.client.name;
            elements.clientRole.textContent = scenario.client.role + ', ' + scenario.client.company;

            // Сбрасываем метрики
            elements.metricResponses.textContent = '0';
            elements.metricAvgScore.textContent = '-';
            elements.metricBestScore.textContent = '-';
            elements.lastResponse.style.display = 'none';

            // Очищаем чат
            elements.chatMessages.innerHTML = '';

            // Приветствие
            setTimeout(() => {
                addMessage('assistant', scenario.greeting);
            }, 500);
        }

        function addMessage(role, content) {
            const msg = document.createElement('div');
            msg.className = `message ${role}`;
            msg.innerHTML = `
                <div class="message-sender">${role === 'user' ? 'Вы' : currentScenario.client.name}</div>
                <div class="message-content">${content}</div>
            `;
            elements.chatMessages.appendChild(msg);
            elements.chatMessages.scrollTop = elements.chatMessages.scrollHeight;
        }

        function sendMessage() {
            const text = elements.chatInput.value.trim();
            if (!text) return;

            addMessage('user', text);
            conversation.push({role: 'user', content: text});
            elements.chatInput.value = '';

            // Оценка ответа
            const evaluation = evaluateResponse(text);
            updateMetrics(evaluation);

            // AI ответ
            const response = getResponse(text, evaluation);
            setTimeout(() => {
                addMessage('assistant', response);
                conversation.push({role: 'assistant', content: response});
            }, 500);
        }

        function evaluateResponse(text) {
            const lower = text.toLowerCase();
            let score = 3;
            let feedback = [];

            if (text.length < 10) {
                score -= 1;
                feedback.push('Слишком коротко');
            } else if (text.length > 20) {
                score += 0.5;
                feedback.push('Хорошая длина');
            }

            if (lower.includes('ценност') || lower.includes('решен')) {
                score += 1;
                feedback.push('Озвучиваете ценность');
            }

            score = Math.max(1, Math.min(5, score));

            let grade = score >= 4 ? '✅ Отлично' : score >= 3 ? '👍 Хорошо' : '⚠️ Нужно улучшить';

            return { score, grade, feedback: feedback.length > 0 ? feedback : ['Нормально'] };
        }

        function updateMetrics(evaluation) {
            metrics.responses++;
            metrics.scores.push(evaluation.score);
            metrics.bestScore = Math.max(metrics.bestScore, evaluation.score);

            const avg = metrics.scores.reduce((a, b) => a + b, 0) / metrics.scores.length;

            elements.metricResponses.textContent = metrics.responses;
            elements.metricAvgScore.textContent = avg.toFixed(1);
            elements.metricBestScore.textContent = metrics.bestScore.toFixed(1);

            elements.lastResponse.style.display = 'block';
            elements.responseGrade.textContent = `Последний ответ: ${evaluation.grade} (${evaluation.score}/5)`;
            elements.responseFeedback.textContent = evaluation.feedback.join(' | ');
        }

        function getResponse(text, evaluation) {
            const lower = text.toLowerCase();

            if (currentScenario.id === 'cold-call') {
                if (evaluation.score >= 4) {
                    return 'Звучит интересно. У нас действительно есть проблемы. Что конкретно предлагаете?';
                }
                return 'У меня мало времени. Суть в чём?';
            }

            if (currentScenario.id === 'demo-banking') {
                if (lower.includes('покаж') || lower.includes('демонстрац')) {
                    return 'Отлично. Начнём с SLA. Как настраиваются уведомления?';
                }
                return 'Покажите как это решает мои проблемы с SLA?';
            }

            if (currentScenario.id === 'objection-price') {
                if (lower.includes('roi') || lower.includes('окуп')) {
                    return 'За какой период окупаемость?';
                }
                return 'Но всё равно дорого. Докажите ROI.';
            }

            return 'Понятно. Что дальше?';
        }

        function backToScenarios() {
            elements.simulation.classList.remove('active');
            elements.hero.style.display = 'block';
            elements.scenarios.style.display = 'none';
            currentScenario = null;
            conversation = [];
        }

        function toggleVoice() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

            if (!SpeechRecognition) {
                alert('Голосовой ввод не поддерживается');
                return;
            }

            if (isRecording) {
                if (recognition) recognition.stop();
            } else {
                recognition = new SpeechRecognition();
                recognition.lang = 'ru-RU';
                recognition.continuous = false;

                recognition.onstart = () => {
                    isRecording = true;
                    document.getElementById('recording').classList.add('active');
                    document.getElementById('voiceButton').textContent = '⏹';
                };

                recognition.onend = () => {
                    isRecording = false;
                    document.getElementById('recording').classList.remove('active');
                    document.getElementById('voiceButton').textContent = '🎤';
                };

                recognition.onresult = (event) => {
                    const text = event.results[0][0].transcript;
                    elements.chatInput.value = text;
                };

                recognition.start();
            }
        }

        // Инициализация
        function init() {
            console.log('Initializing...');

            // Привязка событий
            document.getElementById('startButton').onclick = showScenarios;
            document.getElementById('backButton').onclick = backToScenarios;
            document.getElementById('sendButton').onclick = sendMessage;
            document.getElementById('voiceButton').onclick = toggleVoice;

            // Enter для отправки
            elements.chatInput.onkeydown = (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            };

            console.log('Initialized successfully');
        }

        // Запуск
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }

        console.log('App loaded');
    </script>
</body>
</html>
