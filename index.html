<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ITSM 365 — Тренажёр менеджеров по продажам</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #F5F7FA;
            color: #1A1A1A;
            line-height: 1.6;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
        .hero { text-align: center; margin-bottom: 60px; }
        .logo { font-size: 3rem; font-weight: 700; color: #0066CC; margin-bottom: 20px; }
        .hero p { font-size: 1.2rem; color: #6B7280; margin-bottom: 40px; }
        .cta-button {
            background: #FF6B35; color: white; border: none; padding: 15px 40px;
            font-size: 1.1rem; font-weight: 600; border-radius: 8px; cursor: pointer;
        }
        .scenario-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 25px; }
        .scenario-card {
            background: white; border: 1px solid #E5E7EB; border-radius: 12px; padding: 25px;
            cursor: pointer; transition: all 0.2s;
        }
        .scenario-card:hover { border-color: #0066CC; transform: translateY(-2px); box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .scenario-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 10px; }
        .scenario-desc { font-size: 0.9rem; color: #6B7280; margin-bottom: 15px; }
        .scenario-meta { font-size: 0.8rem; color: #6B7280; margin-bottom: 15px; }
        .scenario-button {
            width: 100%; padding: 12px; background: #0066CC; color: white;
            border: none; border-radius: 8px; font-weight: 600; cursor: pointer;
        }
        .simulation { display: none; }
        .simulation.active { display: block; }
        .sim-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid #E5E7EB;
        }
        .client-info {
            background: white; border: 1px solid #E5E7EB; border-radius: 8px;
            padding: 15px; margin-bottom: 20px;
        }
        .chat-box {
            background: white; border: 1px solid #E5E7EB; border-radius: 8px;
            overflow: hidden;
        }
        .chat-messages {
            min-height: 400px; max-height: 400px; overflow-y: auto;
            padding: 20px; background: #F8FAFC;
        }
        .message { margin-bottom: 20px; }
        .message-sender { font-size: 0.75rem; color: #6B7280; margin-bottom: 5px; }
        .message-content {
            padding: 12px 16px; border-radius: 8px; line-height: 1.5;
        }
        .message.user .message-content { background: #0066CC; color: white; margin-left: auto; max-width: 70%; }
        .message.assistant .message-content { background: #E5E7EB; max-width: 70%; }
        .chat-input-area {
            padding: 15px; border-top: 1px solid #E5E7EB;
        }
        .chat-input {
            width: 100%; border: 1px solid #E5E7EB; border-radius: 8px; padding: 12px;
            resize: none;
        }
        .actions { display: flex; gap: 10px; margin-top: 10px; }
        .voice-btn {
            width: 40px; height: 40px; border-radius: 50%; border: 1px solid #E5E7EB;
            background: white; cursor: pointer; font-size: 1.2rem;
        }
        .send-btn {
            padding: 10px 24px; background: #0066CC; color: white;
            border: none; border-radius: 8px; font-weight: 600; cursor: pointer;
        }
        .back-btn {
            padding: 8px 16px; background: #F5F7FA; border: 1px solid #E5E7EB;
            border-radius: 6px; cursor: pointer;
        }
        .recording {
            position: fixed; bottom: 20px; right: 20px; background: #FF6B35;
            color: white; padding: 12px 20px; border-radius: 30px; display: none;
        }
        .recording.active { display: flex; align-items: center; gap: 10px; }
        .recording-dot {
            width: 10px; height: 10px; background: white; border-radius: 50%;
            animation: blink 1s infinite;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .feedback-panel {
            background: white; border: 1px solid #E5E7EB; border-radius: 8px;
            padding: 15px; margin-top: 20px;
        }
        .feedback-header { font-weight: 600; margin-bottom: 10px; color: #1A1A1A; }
        .feedback-score {
            display: inline-block; padding: 6px 12px; border-radius: 20px;
            font-size: 0.85rem; font-weight: 600; margin-bottom: 10px;
        }
        .score-excellent { background: #10B981; color: white; }
        .score-good { background: #3B82F6; color: white; }
        .score-average { background: #F59E0B; color: white; }
        .score-poor { background: #EF4444; color: white; }
        .feedback-tip { font-size: 0.9rem; color: #6B7280; line-height: 1.5; }
        .metrics-panel {
            background: white; border: 1px solid #E5E7EB; border-radius: 8px;
            padding: 15px; margin-bottom: 20px;
        }
        .metrics-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .metric-item { text-align: center; }
        .metric-value { font-size: 1.5rem; font-weight: 700; color: #0066CC; }
        .metric-label { font-size: 0.75rem; color: #6B7280; margin-top: 5px; }
        .last-response { margin-top: 15px; padding-top: 15px; border-top: 1px solid #E5E7EB; }
        .response-grade { font-weight: 600; margin-bottom: 5px; }
        .grade-5 { color: #10B981; }
        .grade-4 { color: #3B82F6; }
        .grade-3 { color: #F59E0B; }
        .grade-2 { color: #EF4444; }
        .grade-1 { color: #DC2626; }
    </style>
</head>
<body>
    <div class="container">
        <!-- Главный экран -->
        <div class="hero">
            <div class="logo">ITSM 365</div>
            <h1>Тренажёр менеджеров по продажам</h1>
            <p>Практикуйте навыки B2B продаж с AI-клиентами в реалистичных сценариях</p>
            <button class="cta-button" onclick="showScenarios()">🚀 Начать тренировку →</button>
        </div>

        <!-- Сценарии -->
        <div id="scenarios" style="display: none;">
            <h2 style="color: #0066CC; margin-bottom: 20px;">Выберите сценарий</h2>
            <div class="scenario-grid"></div>
        </div>

        <!-- Симуляция -->
        <div id="simulation" class="simulation">
            <div class="sim-header">
                <h2 id="sim-title">Загрузка...</h2>
                <button class="back-btn" onclick="backToScenarios()">← Назад</button>
            </div>

            <div class="client-info">
                <h3 id="client-name">-</h3>
                <p id="client-role">-</p>
            </div>

            <div class="metrics-panel">
                <div class="metrics-grid">
                    <div class="metric-item">
                        <div class="metric-value" id="metric-responses">0</div>
                        <div class="metric-label">Ответов</div>
                    </div>
                    <div class="metric-item">
                        <div class="metric-value" id="metric-avg-score">-</div>
                        <div class="metric-label">Средняя оценка</div>
                    </div>
                    <div class="metric-item">
                        <div class="metric-value" id="metric-best-score">-</div>
                        <div class="metric-label">Лучшая оценка</div>
                    </div>
                </div>
                <div id="last-response" class="last-response" style="display: none;">
                    <div id="response-grade" class="response-grade">Последний ответ: -</div>
                    <div id="response-feedback" class="feedback-tip">-</div>
                </div>
            </div>

            <div class="chat-box">
                <div id="chat-messages" class="chat-messages"></div>
                <div class="chat-input-area">
                    <textarea id="chat-input" class="chat-input" placeholder="Ваше сообщение..." rows="3"></textarea>
                    <div class="actions">
                        <button id="voice-btn" class="voice-btn">🎤</button>
                        <button class="send-btn" onclick="sendMessage()">💬 Отправить</button>
                    </div>
                </div>
            </div>

            <div id="recording" class="recording">
                <div class="recording-dot"></div>
                <span>Слушаю...</span>
            </div>
        </div>
    </div>

    <script>
        // ===============================
        // СЦЕНАРИИ
        // ===============================
        const SCENARIOS = [
            {
                id: 'cold-call-it-company',
                title: 'Холодный звонок в IT компанию',
                category: 'cold-call',
                difficulty: 'intermediate',
                duration: 10,
                client: {
                    name: 'Алексей',
                    role: 'IT Директор',
                    company: 'IT компания "Инфотех"',
                    pain_points: ['Нет единой системы', 'Сотрудники используют почту', 'Инциденты теряются'],
                    personality: 'busy-skeptical'
                },
                greeting: 'Алло? Слушаю, у меня мало времени. Кто звонит?',
                system_prompt: `Ты Алексей, занятой IT директор. Не любишь холодные звонки, но если услышишь ценность — дойдёшь. Боли: нет единой системы, инциденты теряются. Отвечай кратко, скептически.`
            },
            {
                id: 'demo-banking',
                title: 'Демо для CIO банка',
                category: 'demo',
                difficulty: 'advanced',
                duration: 15,
                client: {
                    name: 'Иван',
                    role: 'CIO',
                    company: 'Банк "Солид"',
                    pain_points: ['SLA не выполняются', 'Инциденты теряются', 'Нет отчётов для правления'],
                    personality: 'expert-skeptical'
                },
                greeting: 'Добрый день! У нас 15 минут. Что предлагаем показать?',
                system_prompt: `Ты Иван, CIO крупного банка. Скептик, эксперт. Боли: SLA не выполняются, инциденты теряются. Отвечай кратко (1-2 предложения) по делу. Хочешь увидеть ценность.`
            },
            {
                id: 'objection-price',
                title: 'Возражение: "Дорого"',
                category: 'objections',
                difficulty: 'intermediate',
                duration: 12,
                client: {
                    name: 'Дмитрий',
                    role: 'IT Manager',
                    company: 'Торговая сеть',
                    pain_points: ['Ограниченный бюджет'],
                    personality: 'price-sensitive'
                },
                greeting: 'Посмотрели демо, всё неплохо. Но у вас цены выше чем у 1C. Почему нам платить больше?',
                system_prompt: `Ты Дмитрий, IT Manager торговой сети. Возражение "дорого, 1C дешевле". Не соглашайся сразу. Хочешь понять ROI. Отвечай скептически но открыто. 1-2 предложения.`
            },
            {
                id: 'objection-no-time',
                title: 'Возражение: "Нет времени"',
                category: 'objections',
                difficulty: 'intermediate',
                duration: 10,
                client: {
                    name: 'Мария',
                    role: 'CTO',
                    company: 'Финтех стартап',
                    pain_points: ['Запускаем проект', 'Команда перегружена'],
                    personality: 'busy-ambitious'
                },
                greeting: 'Слушайте, у нас сейчас деплой, совсем нет времени на внедрение новой системы. Может через полгода?',
                system_prompt: `Ты Мария, CTO финтех стартапа. Амбициозная, занятая. Возражение "нет времени, не сейчас". Отвечай быстро, по делу. 1-2 предложения.`
            },
            {
                id: 'objection-competitor',
                title: 'Возражение: "Уже есть система"',
                category: 'objections',
                difficulty: 'advanced',
                duration: 12,
                client: {
                    name: 'Пётр',
                    role: 'IT Директор',
                    company: 'Производственная компания',
                    pain_points: ['Есть Jira/ServiceNow', 'Система устарела', 'Пользователи недовольны'],
                    personality: 'loyal-but-frustrated'
                },
                greeting: 'Ну у нас уже есть Service Now, на которую мы потратили миллионы. Зачем нам что-то новое?',
                system_prompt: `Ты Пётр, лояльный но frustrated IT директор. Есть система (Jira/ServiceNow), но она не работает. Возражение "уже есть". Скептически но заинтересованно. 1-2 предложения.`
            },
            {
                id: 'closing-proposal',
                title: 'Закрытие: Коммерческое предложение',
                category: 'closing',
                difficulty: 'intermediate',
                duration: 8,
                client: {
                    name: 'Елена',
                    role: 'Руководитель поддержки',
                    company: 'Страховая компания',
                    pain_points: ['Нужна aprobation бюджета'],
                    personality: 'interested-but-cautious'
                },
                greeting: 'Спасибо за демо, система интересная. Нужно согласовать бюджет. Что делать дальше?',
                system_prompt: `Ты Елена, Руководитель поддержки страховой компании. Видишь ценность, НО нужно aprobation бюджета. Отвечай дружелюбно но осторожно. 1-2 предложения.`
            },
            {
                id: 'closing-deadline',
                title: 'Закрытие: Deadline по бюджету',
                category: 'closing',
                difficulty: 'advanced',
                duration: 10,
                client: {
                    name: 'Сергей',
                    role: 'CFO',
                    company: 'Ритейлер',
                    pain_points: ['Конец года', 'Бюджет закрывается', 'Нужно решение сейчас'],
                    personality: 'decision-maker-urgent'
                },
                greeting: 'Слушайте, у нас до конца недели нужно принять решение по бюджету. Если не сейчас — то в следующем году. Можете быстро?',
                system_prompt: `Ты Сергей, CFO ритейлера. Deadline oriented. Нужно быстро. Отвечай прямо, по делу. 1-2 предложения. Хочешь цифры, сроки, гарантии.`
            }
        ];

        // ===============================
        // СОСТОЯНИЯ
        // ===============================
        let currentScenario = null;
        let conversation = [];
        let speechRecognition = null;
        let synthesis = window.speechSynthesis;
        let isRecording = false;
        let metrics = {
            responses: 0,
            scores: [],
            bestScore: 0
        };
        let dialogueStage = 'opening'; // opening, discovery, presentation, handling-objections, closing

        // ===============================
        // ФУНКЦИИ
        // ===============================
        function showScenarios() {
            console.log('showScenarios called');
            document.querySelector('.hero').style.display = 'none';
            document.getElementById('scenarios').style.display = 'block';
            renderScenarios();
            console.log('showScenarios completed');
        }

        function renderScenarios() {
            const grid = document.querySelector('.scenario-grid');
            grid.innerHTML = '';

            const categories = {
                'cold-call': '📞 Холодные звонки',
                'demo': '🎯 Демонстрации',
                'objections': '🛡️ Возражения',
                'closing': '💰 Закрытие'
            };

            let currentCat = null;
            SCENARIOS.forEach(scenario => {
                if (scenario.category !== currentCat) {
                    currentCat = scenario.category;

                    const header = document.createElement('h3');
                    header.style.cssText = 'color: #1A1A1A; margin: 30px 0 15px 0;';
                    header.textContent = categories[scenario.category];
                    grid.appendChild(header);
                }

                const card = document.createElement('div');
                card.className = 'scenario-card';

                const diffLabel = scenario.difficulty === 'advanced' ? 'Продвинутый' :
                                  scenario.difficulty === 'intermediate' ? 'Средний' : 'Начальный';

                card.innerHTML = `
                    <div class="scenario-meta">📋 ${diffLabel} • ${scenario.duration} мин</div>
                    <h4 class="scenario-title">${scenario.title}</h4>
                    <p class="scenario-desc">${scenario.client.name} — ${scenario.client.role}, ${scenario.client.company}</p>
                    <p class="scenario-desc">💡 ${scenario.client.pain_points[0]}</p>
                    <button class="scenario-button">Начать тренировку →</button>
                `;

                // Добавляем обработчики отдельно
                const button = card.querySelector('.scenario-button');
                button.onclick = (e) => {
                    e.stopPropagation();
                    startSimulation(scenario.id);
                };

                card.onclick = () => startSimulation(scenario.id);

                grid.appendChild(card);
            });
        }

        function startSimulation(scenarioId) {
            console.log('startSimulation called with ID:', scenarioId);
            const scenario = SCENARIOS.find(s => s.id === scenarioId);
            console.log('Found scenario:', scenario);
            if (!scenario) {
                console.error('Scenario not found for ID:', scenarioId);
                return;
            }

            currentScenario = scenario;
            conversation = [];

            // Сбрасываем метрики
            metrics = {
                responses: 0,
                scores: [],
                bestScore: 0
            };
            dialogueStage = 'opening';

            // Сбрасываем UI метрик
            document.getElementById('metric-responses').textContent = '0';
            document.getElementById('metric-avg-score').textContent = '-';
            document.getElementById('metric-best-score').textContent = '-';
            document.getElementById('last-response').style.display = 'none';

            // Показываем симуляцию
            document.querySelector('.hero').style.display = 'none';
            document.getElementById('scenarios').style.display = 'none';
            document.getElementById('simulation').classList.add('active');

            // Заполняем информацию
            document.getElementById('sim-title').textContent = scenario.title;
            document.getElementById('client-name').textContent = scenario.client.name;
            document.getElementById('client-role').textContent = scenario.client.role + ', ' + scenario.client.company;

            // Очищаем чат
            document.getElementById('chat-messages').innerHTML = '';

            // Приветствие
            setTimeout(() => {
                addMessage('assistant', scenario.greeting);
                speakText(scenario.greeting);
            }, 500);
        }

        function addMessage(role, content) {
            const chat = document.getElementById('chat-messages');
            const msg = document.createElement('div');
            msg.className = `message ${role}`;
            msg.innerHTML = `
                <div class="message-sender">${role === 'user' ? 'Вы' : currentScenario.client.name}</div>
                <div class="message-content">${content}</div>
            `;
            chat.appendChild(msg);
            chat.scrollTop = chat.scrollHeight;
        }

        function speakText(text) {
            if (synthesis && window.speechSynthesis) {
                synthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'ru-RU';
                utterance.rate = 1.0;
                synthesis.speak(utterance);
            }
        }

        function sendMessage() {
            console.log('sendMessage called');
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if (!text) {
                console.log('Empty message, returning');
                return;
            }

            console.log('Processing message:', text);
            addMessage('user', text);
            conversation.push({role: 'user', content: text});
            input.value = '';

            // Оцениваем ответ пользователя
            const evaluation = evaluateResponse(text, conversation);
            updateMetrics(evaluation);

            // AI ответ с улучшенной логикой
            const response = getSmartResponse(text, evaluation);
            addMessage('assistant', response);
            conversation.push({role: 'assistant', content: response});
            speakText(response);
            console.log('sendMessage completed');
        }

        function evaluateResponse(userMessage, conversation) {
            const lower = userMessage.toLowerCase();
            const context = conversation.slice(-4).map(m => m.content.toLowerCase());
            let score = 3; // Базовая оценка
            let feedback = [];
            let grade = '';

            // Критерии оценки в зависимости от сценария
            if (currentScenario.id === 'cold-call-it-company') {
                // Холодный звонок - важно быстро заинтересовать
                if (lower.includes('ценност') || lower.includes('решен') || lower.includes('проблем') || lower.includes('близко')) {
                    score += 1;
                    feedback.push('✅ Хорошо - озвучиваете ценность для клиента');
                }
                if (lower.includes('минут') || lower.includes('секунд') || lower.includes('удобн')) {
                    score += 0.5;
                    feedback.push('✅ Отлично - уважаете время клиента');
                }
                if (userMessage.length < 20) {
                    score -= 1;
                    feedback.push('❌ Слишком коротко - нужна более развернутая ценность');
                }
                if (lower.includes('купить') || lower.includes('цена') || lower.includes('деньг')) {
                    score -= 0.5;
                    feedback.push('⚠️ Слишком рано говорить о деньгах в холодном звонке');
                }
            }

            else if (currentScenario.id === 'demo-banking') {
                // Демо для CIO - нужна экспертность и конкретика
                if (lower.includes('sla') || lower.includes('инцидент') || lower.includes('отчёт') || lower.includes('отчет')) {
                    score += 1;
                    feedback.push('✅ Отлично - затрагиваете конкретные боли клиента');
                }
                if (lower.includes('покаж') || lower.includes('демонстрац') || lower.includes('пример')) {
                    score += 0.5;
                    feedback.push('✅ Хорошо - переходите к демонстрации');
                }
                if (lower.includes('автомат') || lower.includes('ускор') || lower.includes('сократ')) {
                    score += 0.5;
                    feedback.push('✅ Отлично - озвучиваете конкретные улучшения');
                }
                if (userMessage.length < 15) {
                    score -= 0.5;
                    feedback.push('❌ Слишком коротко для CIO уровня');
                }
            }

            else if (currentScenario.id === 'objection-price') {
                // Возражение "дорого" - нужен ROI и сравнение
                if (lower.includes('roi') || lower.includes('окупа') || lower.includes('возврат') || lower.includes('эффективн')) {
                    score += 1.5;
                    feedback.push('✅ Отлично - используете ROI аргументацию');
                }
                if (lower.includes('tc') || lower.includes('общая стоимость') || lower.includes('владен')) {
                    score += 1;
                    feedback.push('✅ Превосходно - сравниваете TCO, а не только цену');
                }
                if (lower.includes('поддержк') || lower.includes('обновлен') || lower.includes('развит')) {
                    score += 0.5;
                    feedback.push('✅ Хорошо - учитываете дополнительные затраты');
                }
                if (lower.includes('скидк') || lower.includes('сделаем') || lower.includes('снизим')) {
                    score -= 1;
                    feedback.push('❌ Не соглашайтесь на скидку сразу - обосновывайте ценность!');
                }
            }

            else if (currentScenario.id === 'objection-no-time') {
                // Возражение "нет времени" - нужна быстрота и простота
                if (lower.includes('быстр') || lower.includes('недел') || lower.includes('дн')) {
                    score += 1;
                    feedback.push('✅ Отлично - показываете как быстро можно начать');
                }
                if (lower.includes('облачн') || lower.includes('saaS') || lower.includes('подключ')) {
                    score += 0.5;
                    feedback.push('✅ Хорошо - предлагаете быстрое облако');
                }
                if (lower.includes('почек') || lower.includes('по результат') || lower.includes('попробу')) {
                    score += 0.5;
                    feedback.push('✅ Отлично - предлагаете пилот вместо полного внедрения');
                }
            }

            else if (currentScenario.id === 'objection-competitor') {
                // Возражение "уже есть система" - нужна дифференциация
                if (lower.includes('отлич') || lower.includes('лучше') || lower.includes('преимущ')) {
                    score += 1;
                    feedback.push('✅ Хорошо - показываете отличия от текущей системы');
                }
                if (lower.includes('миграц') || lower.includes('переезд') || lower.includes('импорт')) {
                    score += 0.5;
                    feedback.push('✅ Отлично - показываете как легко мигрировать');
                }
                if (lower.includes('недоволь') || lower.includes('жалоб') || lower.includes('проблем')) {
                    score += 1;
                    feedback.push('✅ Превосходно - выявляете проблемы с текущей системой');
                }
            }

            else if (currentScenario.id === 'closing-proposal' || currentScenario.id === 'closing-deadline') {
                // Закрытие - нужен конкретный next step
                if (lower.includes('кп') || lower.includes('предложен') || lower.includes('документ')) {
                    score += 0.5;
                    feedback.push('✅ Хорошо - предлагаете материалы');
                }
                if (lower.includes('встреч') || lower.includes('созвон') || lower.includes('вторник') || lower.includes('пятниц')) {
                    score += 1;
                    feedback.push('✅ Отлично - конкретизируете следующую встречу');
                }
                if (lower.includes('когда') || lower.includes('удобн') || lower.includes('свяж')) {
                    score += 0.5;
                    feedback.push('✅ Хорошо - уточняете тайминг');
                }
                if (lower.includes('подумаю') || lower.includes('решим') || lower.includes('позвон')) {
                    score -= 1;
                    feedback.push('❌ Пассивно - берите инициативу в свои руки!');
                }
            }

            // Универсальные критерии
            const wordCount = userMessage.split(/\s+/).length;
            if (wordCount < 5) {
                score -= 0.5;
                feedback.push('⚠️ Слишком короткий ответ');
            } else if (wordCount > 3 && wordCount < 8) {
                // Оптимальная длина для B2B диалогов
            } else if (wordCount > 50) {
                score -= 0.5;
                feedback.push('⚠️ Слишком длинно - потеряете внимание клиента');
            }

            // Вопposсы - хорошо
            if (lower.includes('?')) {
                score += 0.3;
                feedback.push('✅ Хорошо - задаёте вопросы');
            }

            // Качественные слова
            const qualityWords = ['конечно', 'понимаю', 'согласен', 'абсолютно', 'точно', 'уверен'];
            if (qualityWords.some(q => lower.includes(q))) {
                score += 0.2;
            }

            // Ограничиваем оценку от 1 до 5
            score = Math.max(1, Math.min(5, score));
            score = Math.round(score * 10) / 10; // Округляем до 1 знака

            // Определяем текстовую оценку
            if (score >= 4.5) grade = '🌟 Превосходно';
            else if (score >= 4.0) grade = '✅ Отлично';
            else if (score >= 3.5) grade = '👍 Хорошо';
            else if (score >= 2.5) grade = '⚠️ Нормально';
            else grade = '❌ Нужно улучшить';

            return {
                score: score,
                grade: grade,
                feedback: feedback.length > 0 ? feedback : ['💡 Попробуйте добавить больше конкретики о ценности для клиента']
            };
        }

        function updateMetrics(evaluation) {
            metrics.responses++;
            metrics.scores.push(evaluation.score);
            metrics.bestScore = Math.max(metrics.bestScore, evaluation.score);

            const avgScore = metrics.scores.reduce((a, b) => a + b, 0) / metrics.scores.length;

            document.getElementById('metric-responses').textContent = metrics.responses;
            document.getElementById('metric-avg-score').textContent = avgScore.toFixed(1);
            document.getElementById('metric-best-score').textContent = metrics.bestScore.toFixed(1);

            // Показываем оценку последнего ответа
            const lastResponseEl = document.getElementById('last-response');
            lastResponseEl.style.display = 'block';

            const responseGrade = document.getElementById('response-grade');
            responseGrade.textContent = `Последний ответ: ${evaluation.grade} (${evaluation.score}/5)`;
            responseGrade.className = 'response-grade';
            if (evaluation.score >= 4.5) responseGrade.classList.add('grade-5');
            else if (evaluation.score >= 4.0) responseGrade.classList.add('grade-4');
            else if (evaluation.score >= 3.5) responseGrade.classList.add('grade-3');
            else if (evaluation.score >= 2.5) responseGrade.classList.add('grade-2');
            else responseGrade.classList.add('grade-1');

            const responseFeedback = document.getElementById('response-feedback');
            responseFeedback.textContent = evaluation.feedback.join(' | ');
        }

        function getSmartResponse(userMessage, evaluation) {
            const lower = userMessage.toLowerCase();
            const context = conversation.slice(-4).map(m => m.content.toLowerCase());

            // Если ответ хороший - более позитивная реакция
            const isGoodResponse = evaluation.score >= 4.0;
            const isPoorResponse = evaluation.score <= 2.5;

            // Специфичные ответы по сценариям
            if (currentScenario.id === 'cold-call-it-company') {
                if (isGoodResponse && (lower.includes('минут') || lower.includes('ценност'))) {
                    return 'Хм, звучит интересно. У нас действительно есть проблемы с инцидентами. Что конкретно предлагаете?';
                }
                if (isPoorResponse) {
                    return 'Слушайте, у меня действительно нет времени. Если коротко - в чём суть?';
                }
                if (lower.includes('итсм') || lower.includes('систем')) {
                    return 'Понятно. А что это даст нам бизнесу? У нас и так Jira есть.';
                }
                if (lower.includes('проблем') || lower.includes('сложн')) {
                    return 'Да, инциденты теряются, сроки нарушаем... Как вы это решаете?';
                }
                return 'Могу выделить 5 минут. Но только по делу. Что предлагаете?';
            }

            else if (currentScenario.id === 'demo-banking') {
                if (isGoodResponse && (lower.includes('sla') || lower.includes('инцидент'))) {
                    return 'Это как раз то, что нам нужно! Покажите конкретно как SLA контролируется?';
                }
                if (isPoorResponse) {
                    return 'Извините, но я не понимаю как это относится к моим задачам. У нас мало времени.';
                }
                if (lower.includes('показ') || lower.includes('демонстрац')) {
                    return 'Хорошо. Начнём с SLA. Как у вас настраиваются уведомления и эскалации?';
                }
                if (lower.includes('отчёт') || lower.includes('аналитик')) {
                    return 'Отлично! Нам нужны отчёты для правления. Какие есть dashboard?';
                }
                return 'Понятно концепцию. А как это поможет с моими SLA? Покажите конкретику.';
            }

            else if (currentScenario.id === 'objection-price') {
                if (isGoodResponse && (lower.includes('roi') || lower.includes('tc'))) {
                    return 'Хм, логично. За какой период окупаемость вы рассчитываете? Есть кейсы подобные?';
                }
                if (isPoorResponse) {
                    return 'Понимаю, но бюджет ограничен. 1C всё равно дешевле. Докажите иначе.';
                }
                if (lower.includes('поддержк') || lower.includes('обновлен')) {
                    return 'Это fair point. А сколько стоит поддержка в год? Входит ли в лицензию?';
                }
                if (lower.includes('кей') || lower.includes('пример') || lower.includes('компани')) {
                    return 'Покажите кейсы похожих компаний. И реальную экономию.';
                }
                return 'Слышу вас, но цифры нужны. Конкретно: почему ваши цены выше 1C?';
            }

            else if (currentScenario.id === 'objection-no-time') {
                if (isGoodResponse && (lower.includes('быстр') || lower.includes('недел') || lower.includes('облачн'))) {
                    return 'Неделя - это приемлемо. Но какие гарантии что за это время всё заработает?';
                }
                if (isPoorResponse) {
                    return 'Слушайте, у нас деплой горит. Не сейчас. Может в следующем квартале?';
                }
                if (lower.includes('пилот') || lower.includes('попробу') || lower.includes('почек')) {
                    return 'Пилот звучит разумно. Но на какой функционал? Нам нужно всё или ничего.';
                }
                return 'Не понимаю как это быстро. У нас сложная инфраструктура.';
            }

            else if (currentScenario.id === 'objection-competitor') {
                if (isGoodResponse && (lower.includes('отлич') || lower.includes('лучше'))) {
                    return 'Интересно. А миграция данных? У нас там годы накоплений в Service Now.';
                }
                if (isPoorResponse) {
                    return 'Звучит как очередной sales pitch. У нас уже есть система, она работает. Зачем менять?';
                }
                if (lower.includes('миграц') || lower.includes('данн')) {
                    return 'Это важно. А сколько длится миграция? Это просто или болезненно?';
                }
                if (lower.includes('недоволь') || lower.includes('жалоб')) {
                    return 'Да, пользователи жалуются на сложность. Но это привычка. Вы проще?';
                }
                return 'Понятно, но почему это лучше чем то что у нас уже есть и работает?';
            }

            else if (currentScenario.id === 'closing-proposal') {
                if (isGoodResponse && (lower.includes('кп') || lower.includes('встреч'))) {
                    return 'Отлично! Давайте на следующей неделе. Вторник в 14:00 подойдет? И что включить в КП?';
                }
                if (isPoorResponse) {
                    return 'Понимаю. Я так и думал что это сложно. Когда будем готовы discuss по существу?';
                }
                if (lower.includes('срок') || lower.includes('времен') || lower.includes('дней')) {
                    return 'Хорошо. Давайте так - КП к среде, обсудим в пятницу. Условия приемлемы?';
                }
                return 'Нужно согласовать. Подготовьте КП с нашими требованиями. Когда будете готовы?';
            }

            else if (currentScenario.id === 'closing-deadline') {
                if (isGoodResponse && (lower.includes('быстр') || lower.includes('готов') || lower.includes('срок'))) {
                    return 'Отлично! У нас до пятницы. Успеете подготовить предложение? Цены фиксированные?';
                }
                if (isPoorResponse) {
                    return 'Тогда не успеваем. Нам нужно решение до пятницы. Если не вы - то конкуренты.';
                }
                if (lower.includes('цена') || lower.includes('бюджет') || lower.includes('диапазон')) {
                    return 'Бюджет около 2 млн руб в год. Укладываетесь? Если да - готово предложение к среде.';
                }
                return 'У нас до пятницы. Можете быстро? Если да - discuss. Если нет - в следующем году.';
            }

            // Универсальные ответы в зависимости от качества ответа
            if (isGoodResponse) {
                const goodResponses = [
                    'Звучит перспективно. Расскажите подробнее.',
                    'Понимаю. Что конкретно предлагаете дальше?',
                    'Хорошо, это имеет смысл. Продолжайте.',
                    'Интересно! Какие ещё преимущества?'
                ];
                return goodResponses[Math.floor(Math.random() * goodResponses.length)];
            }

            if (isPoorResponse) {
                const poorResponses = [
                    'Понимаю, но не хватает конкретики. В чём реальная ценность?',
                    'Слышу вас, но как это относится к моим задачам?',
                    'Нужно больше подробностей. Конкретно пожалуйста.',
                    'Звучит как sales pitch. А в чём реальная польза для меня?'
                ];
                return poorResponses[Math.floor(Math.random() * poorResponses.length)];
            }

            // Нейтральные ответы
            const neutralResponses = [
                'Понимаю. Что дальше?',
                'Хорошо. Продолжайте.',
                'А как это соотносится с моими задачами?',
                'Интересно. Подробнее?'
            ];
            return neutralResponses[Math.floor(Math.random() * neutralResponses.length)];
        }

        function backToScenarios() {
            document.getElementById('simulation').classList.remove('active');
            document.querySelector('.hero').style.display = 'block';
            document.getElementById('scenarios').style.display = 'none';

            currentScenario = null;
            conversation = [];
        }

        // ===============================
        // ГОЛОС
        // ===============================
        function toggleVoice() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

            if (!SpeechRecognition) {
                alert('Голосовой ввод не поддерживается. Используйте текст.');
                return;
            }

            if (isRecording) {
                stopRecording();
            } else {
                startRecording();
            }
        }

        function startRecording() {
            speechRecognition = new SpeechRecognition();
            speechRecognition.lang = 'ru-RU';
            speechRecognition.continuous = false;
            speechRecognition.interimResults = false;

            speechRecognition.onstart = () => {
                isRecording = true;
                document.getElementById('recording').classList.add('active');
                document.getElementById('voice-btn').textContent = '⏹';
            };

            speechRecognition.onend = () => {
                isRecording = false;
                document.getElementById('recording').classList.remove('active');
                document.getElementById('voice-btn').textContent = '🎤';
            };

            speechRecognition.onresult = (event) => {
                const text = event.results[0][0].transcript;
                document.getElementById('chat-input').value = text;
                setTimeout(() => sendMessage(), 500);
            };

            speechRecognition.onerror = (error) => {
                console.error('Speech error:', error);
                isRecording = false;
                stopRecording();
            };

            speechRecognition.start();
        }

        function stopRecording() {
            if (speechRecognition) {
                speechRecognition.stop();
            }
        }

        // Привязка голосовой кнопки (безопасно)
        document.addEventListener('DOMContentLoaded', function() {
            const voiceBtn = document.getElementById('voice-btn');
            if (voiceBtn) {
                voiceBtn.onclick = toggleVoice;
            }
        });

        // Инициализация с проверкой
        console.log('ITSM365 Sales Trainer загружен');

        // Проверка что все элементы доступны
        function checkElements() {
            const requiredIds = ['scenarios', 'simulation', 'chat-input', 'voice-btn'];
            const missing = [];

            requiredIds.forEach(id => {
                const el = document.getElementById(id);
                if (!el) missing.push(id);
            });

            if (missing.length > 0) {
                console.error('Missing elements:', missing);
            } else {
                console.log('✅ All required elements found');
            }
        }

        // Проверка при загрузке
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', checkElements);
        } else {
            checkElements();
        }
    </script>
