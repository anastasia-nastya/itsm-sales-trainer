<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ITSM 365 — Тренажёр менеджеров по продажам</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
            background: #F5F7FA;
            color: #1A1A1A;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
        .hero { text-align: center; margin-bottom: 60px; }
        .logo { font-size: 3rem; font-weight: 700; color: #0066CC; margin-bottom: 20px; }
        .hero p { font-size: 1.2rem; color: #6B7280; margin-bottom: 40px; }
        .cta-button {
            background: #FF6B35; color: white; border: none; padding: 15px 40px;
            font-size: 1.1rem; font-weight: 600; border-radius: 8px; cursor: pointer;
            -webkit-appearance: none;
            transition: all 0.2s ease;
        }
        .cta-button:hover { background: #e55a2b; transform: scale(1.02); }
        .cta-button:active { transform: scale(0.98); }
        .scenario-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 25px; }
        .scenario-card {
            background: white; border: 1px solid #E5E7EB; border-radius: 12px; padding: 25px;
            cursor: pointer; transition: all 0.2s ease;
        }
        .scenario-card:hover { border-color: #0066CC; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(0,102,204,0.15); }
        .scenario-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 10px; }
        .scenario-desc { font-size: 0.9rem; color: #6B7280; margin-bottom: 15px; }
        .scenario-meta { font-size: 0.8rem; color: #6B7280; margin-bottom: 15px; }
        .scenario-button {
            width: 100%; padding: 12px; background: #0066CC; color: white;
            border: none; border-radius: 8px; font-weight: 600; cursor: pointer;
            -webkit-appearance: none;
            transition: background 0.2s ease;
        }
        .scenario-button:hover { background: #0056b3; }
        .simulation { display: none; }
        .simulation.active { display: block; }
        .sim-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid #E5E7EB;
        }
        .client-info {
            background: white; border: 1px solid #E5E7EB; border-radius: 8px;
            padding: 15px; margin-bottom: 20px;
        }
        .chat-box {
            background: white; border: 1px solid #E5E7EB; border-radius: 8px;
            overflow: hidden;
        }
        .chat-messages {
            min-height: 400px; max-height: 400px; overflow-y: auto;
            padding: 20px; background: #F8FAFC;
            -webkit-overflow-scrolling: touch;
        }
        .message { margin-bottom: 20px; }
        .message-sender { font-size: 0.75rem; color: #6B7280; margin-bottom: 5px; }
        .message-content {
            padding: 12px 16px; border-radius: 8px; line-height: 1.5;
        }
        .message.user .message-content { background: #0066CC; color: white; margin-left: auto; max-width: 70%; }
        .message.assistant .message-content { background: #E5E7EB; max-width: 70%; }
        .chat-input-area {
            padding: 15px; border-top: 1px solid #E5E7EB;
        }
        .chat-input {
            width: 100%; border: 1px solid #E5E7EB; border-radius: 8px; padding: 12px;
            resize: none; font-family: inherit;
            -webkit-appearance: none;
        }
        .actions { display: flex; gap: 10px; margin-top: 10px; }
        .voice-btn {
            width: 40px; height: 40px; border-radius: 50%; border: 1px solid #E5E7EB;
            background: white; cursor: pointer; font-size: 1.2rem;
            -webkit-appearance: none;
        }
        .send-btn {
            padding: 10px 24px; background: #0066CC; color: white;
            border: none; border-radius: 8px; font-weight: 600; cursor: pointer;
            -webkit-appearance: none;
            transition: background 0.2s ease;
        }
        .send-btn:hover { background: #0056b3; }
        .back-btn {
            padding: 8px 16px; background: #F5F7FA; border: 1px solid #E5E7EB;
            border-radius: 6px; cursor: pointer;
            -webkit-appearance: none;
            transition: background 0.2s ease;
        }
        .back-btn:hover { background: #e5e7eb; }
        .metrics-panel {
            background: white; border: 1px solid #E5E7EB; border-radius: 8px;
            padding: 15px; margin-bottom: 20px;
        }
        .metrics-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .metric-item { text-align: center; }
        .metric-value { font-size: 1.5rem; font-weight: 700; color: #0066CC; }
        .metric-label { font-size: 0.75rem; color: #6B7280; margin-top: 5px; }
        .last-response { margin-top: 15px; padding-top: 15px; border-top: 1px solid #E5E7EB; }
        .response-grade { font-weight: 600; margin-bottom: 5px; }
        .feedback-tip { font-size: 0.9rem; color: #6B7280; }
    </style>
</head>
<body>
    <div class="container">
        <!-- Главный экран -->
        <div class="hero" id="hero">
            <div class="logo">ITSM 365</div>
            <h1>Тренажёр менеджеров по продажам</h1>
            <p>Практикуйте навыки B2B продаж с AI-клиентами в реалистичных сценариях</p>
            <button class="cta-button" id="startButton">🚀 Начать тренировку →</button>
        </div>

        <!-- Сценарии -->
        <div id="scenarios" style="display: none;">
            <h2 style="color: #0066CC; margin-bottom: 20px;">Выберите сценарий</h2>
            <div class="scenario-grid" id="scenarioGrid"></div>
        </div>

        <!-- Симуляция -->
        <div id="simulation" class="simulation">
            <div class="sim-header">
                <h2 id="simTitle">Загрузка...</h2>
                <button class="back-btn" id="backButton">← Назад</button>
            </div>

            <div class="client-info">
                <h3 id="clientName">-</h3>
                <p id="clientRole">-</p>
            </div>

            <div class="metrics-panel">
                <div class="metrics-grid">
                    <div class="metric-item">
                        <div class="metric-value" id="metricResponses">0</div>
                        <div class="metric-label">Ответов</div>
                    </div>
                    <div class="metric-item">
                        <div class="metric-value" id="metricAvgScore">-</div>
                        <div class="metric-label">Средняя оценка</div>
                    </div>
                    <div class="metric-item">
                        <div class="metric-value" id="metricBestScore">-</div>
                        <div class="metric-label">Лучшая оценка</div>
                    </div>
                </div>
                <div id="lastResponse" class="last-response" style="display: none;">
                    <div id="responseGrade" class="response-grade">Последний ответ: -</div>
                    <div id="responseFeedback" class="feedback-tip">-</div>
                </div>
            </div>

            <div class="chat-box">
                <div id="chatMessages" class="chat-messages"></div>
                <div class="chat-input-area">
                    <textarea id="chatInput" class="chat-input" placeholder="Ваше сообщение..." rows="3"></textarea>
                    <div class="actions">
                        <button id="voiceButton" class="voice-btn">🎤</button>
                        <button id="sendButton" class="send-btn">💬 Отправить</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Отладочная информация
        console.log('=== ITSM365 Sales Trainer ===');
        console.log('Browser:', navigator.userAgent);
        console.log('Platform:', navigator.platform);
        console.log('Document ready state:', document.readyState);

        // Данные сценариев
        const scenarios = [
            {
                id: 'cold-call',
                title: 'Холодный звонок в IT компанию',
                category: 'cold-call',
                difficulty: 'intermediate',
                duration: 10,
                client: { name: 'Алексей', role: 'IT Директор', company: 'IT компания "Инфotech"' },
                greeting: 'Алло? Слушаю, у меня мало времени. Кто звонит?'
            },
            {
                id: 'demo-banking',
                title: 'Демо для CIO банка',
                category: 'demo',
                difficulty: 'advanced',
                duration: 15,
                client: { name: 'Иван', role: 'CIO', company: 'Банк "Солид"' },
                greeting: 'Добрый день! У нас 15 минут. Что предлагаем показать?'
            },
            {
                id: 'objection-price',
                title: 'Возражение: "Дорого"',
                category: 'objections',
                difficulty: 'intermediate',
                duration: 12,
                client: { name: 'Дмитрий', role: 'IT Manager', company: 'Торговая сеть' },
                greeting: 'Посмотрели демо, всё неплохо. Но у вас цены выше чем у 1C. Почему нам платить больше?'
            },
            {
                id: 'closing',
                title: 'Закрытие сделки',
                category: 'closing',
                difficulty: 'intermediate',
                duration: 8,
                client: { name: 'Елена', role: 'Руководитель поддержки', company: 'Страховая компания' },
                greeting: 'Спасибо за демо, система интересная. Нужно согласовать бюджет. Что делать дальше?'
            }
        ];

        // Состояние
        let currentScenario = null;
        let conversation = [];
        let metrics = { responses: 0, scores: [], bestScore: 0 };

        // Глобальные функции (для Safari)
        window.showScenarios = function() {
            console.log('showScenarios called');
            try {
                document.getElementById('hero').style.display = 'none';
                document.getElementById('scenarios').style.display = 'block';
                renderScenarios();
                console.log('showScenarios completed');
            } catch(e) {
                console.error('showScenarios error:', e);
                alert('Ошибка: ' + e.message);
            }
        };

        window.renderScenarios = function() {
            console.log('renderScenarios called');
            try {
                const grid = document.getElementById('scenarioGrid');
                grid.innerHTML = '';

                const categories = {
                    'cold-call': '📞 Холодные звонки',
                    'demo': '🎯 Демонстрации',
                    'objections': '🛡️ Возражения',
                    'closing': '💰 Закрытие'
                };

                let currentCat = null;

                scenarios.forEach(scenario => {
                    if (scenario.category !== currentCat) {
                        currentCat = scenario.category;
                        const header = document.createElement('h3');
                        header.style.cssText = 'color: #1A1A1A; margin: 30px 0 15px 0;';
                        header.textContent = categories[scenario.category];
                        grid.appendChild(header);
                    }

                    const card = document.createElement('div');
                    card.className = 'scenario-card';

                    const diffLabel = scenario.difficulty === 'advanced' ? 'Продвинутый' :
                                      scenario.difficulty === 'intermediate' ? 'Средний' : 'Начальный';

                    card.innerHTML = `
                        <div class="scenario-meta">📋 ${diffLabel} • ${scenario.duration} мин</div>
                        <h4 class="scenario-title">${scenario.title}</h4>
                        <p class="scenario-desc">${scenario.client.name} — ${scenario.client.role}</p>
                        <button class="scenario-button">Начать тренировку →</button>
                    `;

                    const button = card.querySelector('.scenario-button');
                    button.onclick = (function(scenarioId) {
                        return function(e) {
                            e.stopPropagation();
                            window.startSimulation(scenarioId);
                        };
                    })(scenario.id);

                    card.onclick = (function(scenarioId) {
                        return function() {
                            window.startSimulation(scenarioId);
                        };
                    })(scenario.id);

                    grid.appendChild(card);
                });
                console.log('renderScenarios completed');
            } catch(e) {
                console.error('renderScenarios error:', e);
                alert('Ошибка: ' + e.message);
            }
        };

        window.startSimulation = function(scenarioId) {
            console.log('startSimulation called with:', scenarioId);
            try {
                const scenario = scenarios.find(function(s) { return s.id === scenarioId; });
                if (!scenario) {
                    console.error('Scenario not found:', scenarioId);
                    alert('Сценарий не найден!');
                    return;
                }

                currentScenario = scenario;
                conversation = [];
                metrics = { responses: 0, scores: [], bestScore: 0 };

                document.getElementById('hero').style.display = 'none';
                document.getElementById('scenarios').style.display = 'none';
                document.getElementById('simulation').classList.add('active');

                document.getElementById('simTitle').textContent = scenario.title;
                document.getElementById('clientName').textContent = scenario.client.name;
                document.getElementById('clientRole').textContent = scenario.client.role + ', ' + scenario.client.company;

                document.getElementById('metricResponses').textContent = '0';
                document.getElementById('metricAvgScore').textContent = '-';
                document.getElementById('metricBestScore').textContent = '-';
                document.getElementById('lastResponse').style.display = 'none';

                document.getElementById('chatMessages').innerHTML = '';

                setTimeout(function() {
                    window.addMessage('assistant', scenario.greeting);
                }, 500);

                console.log('startSimulation completed');
            } catch(e) {
                console.error('startSimulation error:', e);
                alert('Ошибка: ' + e.message);
            }
        };

        window.addMessage = function(role, content) {
            try {
                const chat = document.getElementById('chatMessages');
                const msg = document.createElement('div');
                msg.className = 'message ' + role;
                msg.innerHTML = 
                    '<div class="message-sender">' + (role === 'user' ? 'Вы' : currentScenario.client.name) + '</div>' +
                    '<div class="message-content">' + content + '</div>';
                chat.appendChild(msg);
                chat.scrollTop = chat.scrollHeight;
            } catch(e) {
                console.error('addMessage error:', e);
            }
        };

        window.sendMessage = function() {
            console.log('sendMessage called');
            try {
                const input = document.getElementById('chatInput');
                const text = input.value.trim();
                if (!text) return;

                window.addMessage('user', text);
                conversation.push({role: 'user', content: text});
                input.value = '';

                const evaluation = window.evaluateResponse(text);
                window.updateMetrics(evaluation);

                const response = window.getResponse(text, evaluation);
                setTimeout(function() {
                    window.addMessage('assistant', response);
                    conversation.push({role: 'assistant', content: response});
                }, 500);

                console.log('sendMessage completed');
            } catch(e) {
                console.error('sendMessage error:', e);
                alert('Ошибка: ' + e.message);
            }
        };

        window.evaluateResponse = function(text) {
            const lower = text.toLowerCase();
            let score = 3;
            let feedback = [];

            if (text.length < 10) {
                score -= 1;
                feedback.push('Слишком коротко');
            } else if (text.length > 20) {
                score += 0.5;
                feedback.push('Хорошая длина');
            }

            if (lower.includes('ценност') || lower.includes('решен')) {
                score += 1;
                feedback.push('Озвучиваете ценность');
            }

            score = Math.max(1, Math.min(5, score));

            let grade = score >= 4 ? '✅ Отлично' : score >= 3 ? '👍 Хорошо' : '⚠️ Нужно улучшить';

            return { score: score, grade: grade, feedback: feedback.length > 0 ? feedback : ['Нормально'] };
        };

        window.updateMetrics = function(evaluation) {
            try {
                metrics.responses++;
                metrics.scores.push(evaluation.score);
                metrics.bestScore = Math.max(metrics.bestScore, evaluation.score);

                const avg = metrics.scores.reduce(function(a, b) { return a + b; }, 0) / metrics.scores.length;

                document.getElementById('metricResponses').textContent = metrics.responses;
                document.getElementById('metricAvgScore').textContent = avg.toFixed(1);
                document.getElementById('metricBestScore').textContent = metrics.bestScore.toFixed(1);

                document.getElementById('lastResponse').style.display = 'block';
                document.getElementById('responseGrade').textContent = 'Последний ответ: ' + evaluation.grade + ' (' + evaluation.score + '/5)';
                document.getElementById('responseFeedback').textContent = evaluation.feedback.join(' | ');
            } catch(e) {
                console.error('updateMetrics error:', e);
            }
        };

        window.getResponse = function(text, evaluation) {
            const lower = text.toLowerCase();

            if (currentScenario.id === 'cold-call') {
                if (evaluation.score >= 4) {
                    return 'Звучит интересно. У нас действительно есть проблемы. Что конкретно предлагаете?';
                }
                return 'У меня мало времени. Суть в чём?';
            }

            if (currentScenario.id === 'demo-banking') {
                if (lower.includes('покаж') || lower.includes('демонстрац')) {
                    return 'Отлично. Начнём с SLA. Как настраиваются уведомления?';
                }
                return 'Покажите как это решает мои проблемы с SLA?';
            }

            if (currentScenario.id === 'objection-price') {
                if (lower.includes('roi') || lower.includes('окуп')) {
                    return 'За какой период окупаемость?';
                }
                return 'Но всё равно дорого. Докажите ROI.';
            }

            return 'Понятно. Что дальше?';
        };

        window.backToScenarios = function() {
            console.log('backToScenarios called');
            try {
                document.getElementById('simulation').classList.remove('active');
                document.getElementById('hero').style.display = 'block';
                document.getElementById('scenarios').style.display = 'none';
                currentScenario = null;
                conversation = [];
            } catch(e) {
                console.error('backToScenarios error:', e);
            }
        };

        // Инициализация
        function init() {
            console.log('init called');

            try {
                // Проверка элементов
                const startBtn = document.getElementById('startButton');
                console.log('startButton element:', startBtn);

                if (!startBtn) {
                    console.error('startButton NOT FOUND!');
                    alert('Ошибка: кнопка не найдена!');
                    return;
                }

                // Привязка через onclick
                startBtn.onclick = window.showScenarios;
                console.log('startButton.onclick assigned');

                document.getElementById('backButton').onclick = window.backToScenarios;
                document.getElementById('sendButton').onclick = window.sendMessage;

                const chatInput = document.getElementById('chatInput');
                chatInput.onkeydown = function(e) {
                    if (e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault();
                        window.sendMessage();
                    }
                };

                console.log('=== INIT COMPLETE ===');
                console.log('Available functions:', {
                    showScenarios: typeof window.showScenarios,
                    startSimulation: typeof window.startSimulation,
                    sendMessage: typeof window.sendMessage,
                    backToScenarios: typeof window.backToScenarios
                });

            } catch(e) {
                console.error('init error:', e);
                alert('Ошибка инициализации: ' + e.message);
            }
        }

        // Запуск инициализации
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }

        console.log('=== SCRIPT LOADED ===');
    </script>
</body>
</html>
