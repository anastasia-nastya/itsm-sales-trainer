<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ITSM 365 — Тренажёр</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f5f5f5; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; }
        h1 { color: #0066CC; text-align: center; }
        button { 
            width: 100%; padding: 15px; font-size: 18px; 
            background: #FF6B35; color: white; border: none; 
            border-radius: 8px; cursor: pointer; margin: 10px 0; 
        }
        button:hover { background: #e55a2b; }
        #menu { display: none; }
        #menu button { background: #0066CC; }
        #menu button:hover { background: #0056b3; }
        .chat { display: none; border: 1px solid #ddd; padding: 15px; margin: 10px 0; }
        .message { padding: 10px; margin: 5px 0; border-radius: 5px; }
        .user { background: #0066CC; color: white; }
        .assistant { background: #f0f0f0; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>ITSM 365</h1>
        <p style="text-align: center;">Тренажёр менеджеров по продажам</p>
        
        <button onclick="showMenu()">🚀 Начать тренировку</button>
        
        <div id="menu">
            <h2>Выберите сценарий:</h2>
            <button onclick="startDemo()">Демо для CIO</button>
            <button onclick="startObjection()">Возражение: Дорого</button>
            <button onclick="startClosing()">Закрытие сделки</button>
        </div>
        
        <div id="chat" class="chat">
            <h3 id="clientName">-</h3>
            <div id="messages"></div>
            <input type="text" id="msgInput" placeholder="Ваше сообщение...">
            <button onclick="sendMsg()">💬 Отправить</button>
            <button onclick="backMenu()">← Назад</button>
        </div>
    </div>

    <script>
        var client = "";
        var messages = [];

        function showMenu() {
            document.getElementById('menu').style.display = 'block';
            console.log('Menu shown');
        }

        function startDemo() {
            client = "Иван (CIO банка)";
            document.getElementById('menu').style.display = 'none';
            document.getElementById('chat').style.display = 'block';
            document.getElementById('clientName').textContent = client;
            addMessage('assistant', 'Добрый день! У нас 15 минут. Что предлагаем показать?');
        }

        function startObjection() {
            client = "Дмитрий (IT Manager)";
            document.getElementById('menu').style.display = 'none';
            document.getElementById('chat').style.display = 'block';
            document.getElementById('clientName').textContent = client;
            addMessage('assistant', 'Посмотрели демо, всё неплохо. Но у вас цены выше чем у 1C. Почему нам платить больше?');
        }

        function startClosing() {
            client = "Елена (Руководитель поддержки)";
            document.getElementById('menu').style.display = 'none';
            document.getElementById('chat').style.display = 'block';
            document.getElementById('clientName').textContent = client;
            addMessage('assistant', 'Спасибо за демо, система интересная. Нужно согласовать бюджет. Что делать дальше?');
        }

        function addMessage(role, text) {
            var div = document.createElement('div');
            div.className = 'message ' + role;
            div.textContent = (role === 'user' ? 'Вы: ' : client + ': ') + text;
            document.getElementById('messages').appendChild(div);
        }

        function sendMsg() {
            var input = document.getElementById('msgInput');
            var text = input.value;
            if (!text) return;
            
            addMessage('user', text);
            input.value = '';
            
            setTimeout(function() {
                var responses = [
                    'Понятно. Расскажите подробнее.',
                    'Интересно. Какие ещё преимущества?',
                    'Хорошо. Что дальше?',
                    'Звучит перспективно. Продолжайте.'
                ];
                var randomResponse = responses[Math.floor(Math.random() * responses.length)];
                addMessage('assistant', randomResponse);
            }, 500);
        }

        function backMenu() {
            document.getElementById('chat').style.display = 'none';
            document.getElementById('menu').style.display = 'block';
            document.getElementById('messages').innerHTML = '';
        }

        // Enter для отправки
        document.getElementById('msgInput').onkeydown = function(e) {
            if (e.key === 'Enter') sendMsg();
        };

        console.log('App loaded - using var syntax');
        console.log('showMenu function:', typeof showMenu);
    </script>
</body>
</html>
